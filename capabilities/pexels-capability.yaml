        type: string
        description: Search keyword such as "Ocean" or "Tigers".
        required: true
      - name: orientation
        type: string
        description: orientation
      - name: size
        type: string
        description: size
      - name: color
        type: string
        description: color
      - name: locale
        type: string
        description: locale
      - name: page
        type: integer
        description: page
      - name: per_page
        type: integer
        description: per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: getcuratedphotos
