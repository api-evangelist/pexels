      call: pexels.getphoto
      with:
        id: tools.id
      inputParameters:
      - name: id
        type: string
        description: id
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: searchvideos
      description: Search Videos
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pexels.searchvideos
      with:
        query: tools.query
        orientation: tools.orientation
